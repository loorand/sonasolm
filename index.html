<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sõnasõlm</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styling.css">
</head>
<body>
    <h1>Sõnasõlm</h1>

    <div id="koduleht" class="leht">
        <div class="nupud">
            <button onclick="avaKodu()">Kodu</button>
            <button onclick="avaMäng()">Alusta</button>
            <button onclick="avaÕpetus()">Õpetus</button>
        </div>

        <h2>Pealkiri</h2>
        <p>Tekst...</p>
    </div>

    <div id="mänguleht" class="leht" style="display:none">
        <h2>Mäng</h2>
        <p>Tekst...</p>
        <button onclick="avaKodu()">Kodu</button>
    </div>

    <div id="õpetus" class="leht" style="display:none">
        <h2>Õpetus</h2>
        <p>Mängu eesmärk on...</p>
        <p>Näiteks...</p>
        <button onclick="avaKodu()">Kodu</button>
        <button onclick="avaMäng()">Alusta</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
